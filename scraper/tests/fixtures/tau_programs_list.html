<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>לימודי תואר ראשון — אוניברסיטת תל אביב</title>
</head>
<body>
<main>
  <!-- Programs grid rendered by React after JS execution -->
  <div class="programs-browser">
    <div class="programs-grid">

      <article class="program-card" data-faculty="מדעי המחשב">
        <h3 class="program-card__name">
          <a href="/he/programs/cs-bsc" class="program-card__link">מדעי המחשב</a>
        </h3>
        <div class="program-card__meta">
          <span class="program-card__degree">B.Sc</span>
          <span class="program-card__faculty">בית הספר למדעי המחשב</span>
        </div>
      </article>

      <article class="program-card" data-faculty="הנדסה">
        <h3 class="program-card__name">
          <a href="/he/programs/ee-bsc" class="program-card__link">הנדסת חשמל ואלקטרוניקה</a>
        </h3>
        <div class="program-card__meta">
          <span class="program-card__degree">B.Sc</span>
          <span class="program-card__faculty">הפקולטה להנדסה</span>
        </div>
      </article>

      <article class="program-card" data-faculty="משפטים">
        <h3 class="program-card__name">
          <a href="/he/programs/law-llb" class="program-card__link">משפטים</a>
        </h3>
        <div class="program-card__meta">
          <span class="program-card__degree">LL.B</span>
          <span class="program-card__faculty">הפקולטה למשפטים</span>
        </div>
      </article>

      <article class="program-card" data-faculty="ניהול">
        <h3 class="program-card__name">
          <a href="/he/programs/ba-management" class="program-card__link">מינהל עסקים</a>
        </h3>
        <div class="program-card__meta">
          <span class="program-card__degree">B.A</span>
          <span class="program-card__faculty">הפקולטה לניהול</span>
        </div>
      </article>

      <article class="program-card" data-faculty="חינוך">
        <h3 class="program-card__name">
          <a href="/he/programs/education-bed" class="program-card__link">חינוך והוראה</a>
        </h3>
        <div class="program-card__meta">
          <span class="program-card__degree">B.Ed</span>
          <span class="program-card__faculty">בית הספר לחינוך</span>
        </div>
      </article>

    </div><!-- /.programs-grid -->
  </div><!-- /.programs-browser -->
</main>
</body>
</html>
